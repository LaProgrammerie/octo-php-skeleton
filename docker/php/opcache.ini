; =============================================================================
; OPcache configuration — Production (long-running OpenSwoole server)
; =============================================================================
; Tuned for a long-running PHP process where scripts are loaded once at boot
; and never change during the process lifetime.
; =============================================================================

[opcache]
opcache.enable=1
opcache.enable_cli=1

; Memory — generous for long-running process
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000

; Validation — disabled in prod (scripts don't change at runtime)
opcache.validate_timestamps=0
opcache.revalidate_freq=0

; Performance
opcache.save_comments=1
opcache.jit_buffer_size=64M
opcache.jit=tracing
